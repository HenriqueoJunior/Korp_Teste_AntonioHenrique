<mat-sidenav-container style="height: 100vh;">

  <mat-sidenav mode="side" opened style="width: 220px; padding: 16px;">
    <h3 style="margin: 0 0 24px 8px; font-size: 16px; font-weight: 500;">
      Notas Fiscais
    </h3>

    <mat-nav-list>
      <a mat-list-item
         routerLink="/produtos"
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Produtos</span>
      </a>

      <a mat-list-item
         routerLink="/notas-fiscais"
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span matListItemTitle>Notas Fiscais</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content style="padding: 24px;">
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>
