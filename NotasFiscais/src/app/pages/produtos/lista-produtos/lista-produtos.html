<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
  <h2 style="margin: 0;">Produtos</h2>
  <a mat-raised-button color="primary" routerLink="/produtos/novo">
    <mat-icon>add</mat-icon>
    Novo Produto
  </a>
</div>

@if (carregando()) {
  <div style="display: flex; justify-content: center; padding: 48px;">
    <mat-spinner />
  </div>
} @else if (produtos().length === 0) {
  <p style="text-align: center; color: #888; padding: 48px;">
    Nenhum produto cadastrado. Clique em "Novo Produto" para começar.
  </p>
} @else {
  <table mat-table [dataSource]="produtos()" style="width: 100%;">

    <ng-container matColumnDef="codigo">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let p">{{ p.codigo }}</td>
    </ng-container>

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef>Descrição</th>
      <td mat-cell *matCellDef="let p">{{ p.descricao }}</td>
    </ng-container>

    <ng-container matColumnDef="saldo">
      <th mat-header-cell *matHeaderCellDef>Saldo</th>
      <td mat-cell *matCellDef="let p">{{ p.saldo }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let p">
        <a mat-icon-button [routerLink]="['/produtos/editar', p.id]">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deletar(p.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

  </table>
}
